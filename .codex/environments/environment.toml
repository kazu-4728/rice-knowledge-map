}

if (Test-Path "run\setup.ps1") {
  powershell -ExecutionPolicy Bypass -File "run\setup.ps1"
} elseif ((Test-Path "run\setup.sh") -and (Get-Command bash -ErrorAction SilentlyContinue)) {
  bash "run/setup.sh"
}
'''

